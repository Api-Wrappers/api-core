name: Bug report
description: Report a reproducible problem in api-core
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone to reproduce the behavior without access to your local project.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A clear description of the problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide a minimal example, test case, or repository link.
      placeholder: |
        1. Create a client with ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include stack traces or response details when relevant.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: api-core version
      placeholder: "1.0.2"
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Bun
        - Node.js
        - Browser
        - Edge runtime
        - Other
    validations:
      required: true
  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      placeholder: "Bun 1.3.13, Node 22.x, browser/version, etc."
  - type: textarea
    id: config
    attributes:
      label: Client configuration
      description: Share relevant `createClient` options, plugins, retry config, transport config, or custom fetch setup.
      render: ts
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: What commands did you run?
      placeholder: |
        bun install
        bun run verify
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked for an existing issue.
          required: true
        - label: I can reproduce this with the latest available version.
          required: true
        - label: I included a minimal reproduction or enough code to reproduce the issue.
          required: true
