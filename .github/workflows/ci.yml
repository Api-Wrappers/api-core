name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Check, test, build, and pack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.0.2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting and lint
        run: set -o pipefail; bun run check:ci 2>&1 | tee check.log

      - name: Typecheck
        run: set -o pipefail; bun run typecheck 2>&1 | tee typecheck.log

      - name: Run tests
        run: set -o pipefail; bun test 2>&1 | tee test.log

      - name: Build
        run: set -o pipefail; bun run build 2>&1 | tee build.log

      - name: Verify package contents
        run: set -o pipefail; bun run pack:dry-run 2>&1 | tee pack.log

      - name: Smoke test packed package
        run: set -o pipefail; bun run smoke:package 2>&1 | tee smoke.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: verify-diagnostics
          path: "*.log"
          retention-days: 1

      - name: Smoke test built entrypoints
        run: |
          node --input-type=module -e "const m = await import('./dist/index.mjs'); if (typeof m.createClient !== 'function') throw new Error('missing ESM createClient')"
          node -e "const m = require('./dist/index.cjs'); if (typeof m.createClient !== 'function') throw new Error('missing CJS createClient')"

      - name: Verify npm package contents
        run: npm pack --dry-run --json

      - name: Pack artifact
        if: github.event_name != 'pull_request'
        run: npm pack --json

      - name: Upload package artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: npm-package
          path: "*.tgz"
          if-no-files-found: error
          retention-days: 7

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4.9.0
